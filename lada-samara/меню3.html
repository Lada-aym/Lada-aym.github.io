<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AdFox Fix</title>
</head>
<body>
  <!-- Карточка с изображением пробки топливного бака -->
<div class="mb-image-block">
  <div class="image-card image-card--limited">
    <figure>
      <img src="/lada-samara/assets/images/lada-samara-probka-toplivnogo-baka.webp"
           alt="Пробка топливного бака с крышкой"
           class="img-fluid"
           loading="lazy"
           decoding="async">
      <figcaption class="image-caption">
        <strong>Рис. 18.</strong> Пробка топливного бака
      </figcaption>
    </figure>
  </div>
</div>
<!-- Рекламный блок AdFox -->
<div class="ad-container my-4 text-center">
  <div id="adfox_173934500594834357"></div>
</div>

<script>
  // Оборачиваем всю логику в событие DOMContentLoaded
  document.addEventListener('DOMContentLoaded', () => {
    // Предварительно инициализируем window.yaContextCb, если его нет
    window.yaContextCb = window.yaContextCb || [];

    // Добавляем функцию инициализации AdFox
    window.yaContextCb.push(() => {
      Ya.adfoxCode.create({
        ownerId: 322697,
        containerId: 'adfox_173934500594834357',
        params: {
          pp: 'i',
          ps: 'ivjz',
          p2: 'gqqu'
        }
      });
    });

    // Остальная логика
    const MAX_ADS = 3;
    const MIN_IMAGE_WIDTH = 300;
    const MIN_IMAGE_HEIGHT = 250;
    let adCount = 0;

    // Проверка размеров изображения
    const isImageLargeEnough = (image) => {
      if (image.complete) {
        return image.naturalWidth >= MIN_IMAGE_WIDTH && image.naturalHeight >= MIN_IMAGE_HEIGHT;
      }
      const width = parseInt(image.getAttribute('width') || image.style.width || 0);
      const height = parseInt(image.getAttribute('height') || image.style.height || 0);
      return width >= MIN_IMAGE_WIDTH && height >= MIN_IMAGE_HEIGHT;
    };

    // Проверка перекрытия рекламы
    const hasNearbyAd = (image) => {
      const rect = image.getBoundingClientRect();
      const ads = document.querySelectorAll('[data-adfox],[data-yandex]');

      for (let ad of ads) {
        const adRect = ad.getBoundingClientRect();
        const overlap =
          !(rect.right <= adRect.left || rect.left >= adRect.right ||
            rect.bottom <= adRect.top || rect.top >= adRect.bottom);

        if (overlap) return true;
      }
      return false;
    };

    // Функция создания объявления
    const renderInImageAd = (image, index) => {
      if (adCount >= MAX_ADS) return;
      if (!isImageLargeEnough(image)) return;
      if (hasNearbyAd(image)) return;

      const imageId = `yandex_rtb_R-A-537370-42_${Date.now()}_${index}`;
      image.id = imageId;
      image.setAttribute('data-ad-rendered', 'true');

      window.yaContextCb.push(() => {
        try {
          Ya.Context.AdvManager.render({
            renderTo: imageId,
            blockId: 'R-A-537370-42',
            type: 'inImage'
          });
          adCount++;
          console.log(`✅ Rendered inImage ad: ${imageId}`);
        } catch (err) {
          console.error('❌ Error rendering inImage ad:', err.message);
        }
      });
    };

    // Инициализация рекламы
    const initInImageAds = () => {
      const images = Array.from(document.querySelectorAll('img:not([data-ad-rendered]):not(.ad-ignore)'));

      images.forEach((image, index) => {
        if (adCount >= MAX_ADS) return;

        if (image.complete) {
          renderInImageAd(image, index);
        } else {
          image.addEventListener('load', () => renderInImageAd(image, index), {once: true});
        }
      });
    };

    // Загрузка библиотеки Yandex Context
    const contextScript = document.createElement('script');
    contextScript.src = 'https://yandex.ru/ads/system/context.js';
    contextScript.async = true;
    document.head.appendChild(contextScript);

    // Регистрация нашей функции инициализации
    window.yaContextCb.push(initInImageAds);
  });
</script>

<!-- Yandex Autoplacement 537370 -->
<script data-page-id="537370" src="https://yandex.ru/ads/system/ap-loader.js" async></script>
</body>
</html>
