<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>OS Search Generator PRO</title>
</head>
<body>

<button onclick="generate()">Generate search.json</button>

<script>
async function generate(){

  const res = await fetch('/sitemap.xml');
  const xmlText = await res.text();
  const xml = new DOMParser().parseFromString(xmlText, "text/xml");

  const urls = [...xml.querySelectorAll("loc")].map(el => el.textContent);

  const results = [];

  for(const url of urls){

    try{
      const page = await fetch(url);
      const html = await page.text();
      const doc = new DOMParser().parseFromString(html, "text/html");

      // =========================
      // TITLE
      // =========================
      const title = doc.querySelector("title")?.innerText?.trim() || "Untitled";

      // =========================
      // REMOVE NOISE
      // =========================
      doc.querySelectorAll(`
        script, style, nav, header, footer,
        .menu, .navbar, .sidebar, .dropdown
      `).forEach(el => el.remove());

      // =========================
      // SMART CONTENT EXTRACTION
      // =========================
      const article =
        doc.querySelector("article") ||
        doc.querySelector('[itemprop="articleBody"]') ||
        doc.body;

      let text = article.innerText || "";

      text = text
        .replace(/\s+/g, " ")
        .trim();

      if(text.length < 30) continue;

      // =========================
      // SMART TAGS (OS FEATURE)
      // =========================
      const section =
        url.includes("engine") ? "engine" :
        url.includes("repair") ? "repair" :
        url.includes("manual") ? "manual" :
        "general";

      // =========================
      // SCORE PREPARATION (for OS search)
      // =========================
      const importance =
        title.includes("Engine") ? 5 :
        title.includes("Repair") ? 4 :
        3;

      results.push({
        title,
        url,
        content: text.slice(0, 600),
        section,
        importance
      });

    } catch(e){
      console.warn("skip:", url);
    }

  }

  // =========================
  // SORT (OS RANKING)
  // =========================
  results.sort((a,b)=>b.importance - a.importance);

  // =========================
  // DOWNLOAD
  // =========================
  const blob = new Blob(
    [JSON.stringify(results, null, 2)],
    { type: "application/json" }
  );

  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "search.json";
  a.click();

  console.log("OS INDEX GENERATED:", results.length);
}

</script>

</body>
</html>
