<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>OS Search Generator</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      padding: 40px;
    }

    button {
      height: 48px;
      padding: 0 24px;
      border: none;
      border-radius: 12px;
      background: #0d6efd;
      color: #fff;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      opacity: .9;
    }

    pre {
      margin-top: 20px;
      padding: 20px;
      background: #111;
      color: #0f0;
      border-radius: 12px;
      overflow: auto;
      max-height: 500px;
    }
  </style>
</head>
<body>

<h1>OS Search Generator</h1>

<button onclick="generate()">
  Generate search.json
</button>

<pre id="log"></pre>

<script>
const logEl = document.getElementById("log");

function log(...args){
  console.log(...args);
  logEl.textContent += args.join(" ") + "\n";
}

// =========================
// URL NORMALIZE
// =========================
function normalizeUrl(url){
  try {
    const u = new URL(url, location.href);
    return u.pathname
      .replace(/index\.html$/i, "")
      .replace(/\/+$/, "") || "/";
  } catch {
    return url;
  }
}

// =========================
// SECTION DETECT
// =========================
function detectSection(path){
  const parts = path.split("/").filter(Boolean);
  return parts.length ? parts[0] : null;
}

// =========================
// CLEAN TEXT
// =========================
function clean(text){
  return (text || "")
    .replace(/\s+/g, " ")
    .replace(/\u00a0/g, " ")
    .trim();
}

// =========================
// TITLE (ROBUST)
// =========================
function getTitle(doc){

  const h1 =
    doc.querySelector("main h1") ||
    doc.querySelector("article h1") ||
    doc.querySelector("h1");

  if (h1) return clean(h1.innerText);

  let t = doc.querySelector("title")?.innerText || "";
  t = clean(t).replace(/\s*\|.*$/, "");

  return t || "Untitled";
}

// =========================
// CONTENT (VERY SAFE)
// =========================
function getContent(doc){

  // remove noise
  doc.querySelectorAll(`
    script,style,nav,header,footer,noscript,
    iframe,.sidebar,.dropdown,.search-float,
    .os-overlay,.menu-scroll,.nav-actions,
    .ads,.comments
  `).forEach(e => e.remove());

  // 🔥 главный fallback — schema.org + body
  const candidates = [
    doc.querySelector('[itemprop="articleBody"]'),
    doc.querySelector('[itemprop="text"]'),
    doc.querySelector("main"),
    doc.querySelector("article"),
    doc.body
  ].filter(Boolean);

  let best = "";

  for (const el of candidates){
    const txt = clean(el.innerText);
    if (txt.length > best.length) best = txt;
  }

  // fallback из <p>
  if (best.length < 80){
    const ps = [...doc.querySelectorAll("p")]
      .map(p => clean(p.innerText))
      .filter(t => t.length > 20);

    best = ps.join(" ");
  }

  return best;
}

// =========================
// GENERATOR
// =========================
async function generate(){

  logEl.textContent = "";
  log("Loading sitemap...");

  try {

    const res = await fetch("/sitemap.xml");
    const xml = new DOMParser()
      .parseFromString(await res.text(), "text/xml");

    const urls = [...xml.querySelectorAll("loc")]
      .map(x => x.textContent.trim())
      .filter(Boolean);

    log("Pages found:", urls.length);

    const map = {};
    let ok = 0;

    for (const url of urls){

      try {

        log("Index:", url);

        const page = await fetch(url);
        if (!page.ok) continue;

        const doc = new DOMParser()
          .parseFromString(await page.text(), "text/html");

        const title = getTitle(doc);
        const content = getContent(doc);

        // 🔥 НЕ УБИВАЕМ СЛИШКОМ ЖЁСТКО
        if (content.length < 30) continue;

        const path = normalizeUrl(url);
        const section = detectSection(path);

        if (!section) continue;

        if (!map[section]){
          map[section] = {
            id: section,
            title: section
              .replace(/_/g," ")
              .replace(/\b\w/g,s=>s.toUpperCase()),
            url: "/" + section + "/",
            items: []
          };
        }

        map[section].items.push({
          title,
          url: path,
          content: content.slice(0, 300)
        });

        ok++;

      } catch (e){
        log("skip:", url);
      }
    }

    const result = {
      models: Object.values(map).filter(m => m.items.length)
    };

    const blob = new Blob(
      [JSON.stringify(result, null, 2)],
      { type: "application/json" }
    );

    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "search.json";
    a.click();

    log("");
    log("DONE");
    log("OK pages:", ok);
    log("Models:", result.models.length);

    let pages = 0;
    result.models.forEach(m => pages += m.items.length);

    log("Total items:", pages);

  } catch (e){
    log("ERROR:", e.message);
  }
}
</script>

</body>
</html>
