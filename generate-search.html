<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Search Generator (Optimized)</title>
</head>
<body>

<button onclick="generate()">Сгенерировать search.json</button>

<script>
async function generate(){

  const BASE = 'https://lada-aym.github.io';

  const res = await fetch(BASE + '/sitemap.xml');
  const xmlText = await res.text();
  const xml = new DOMParser().parseFromString(xmlText, "text/xml");

  const urls = [...xml.querySelectorAll('loc')].map(n => n.textContent);

  let pages = [];

  for (let url of urls){

    try{

      const r = await fetch(url);
      const html = await r.text();

      const doc = new DOMParser().parseFromString(html, 'text/html');

      const clean = t => t.replace(/\s+/g,' ').trim().toLowerCase();

      // 🔥 лёгкий текст (важно)
      const bodyText = clean(doc.body.innerText).slice(0, 800);

      // 🔥 title
      const title =
        doc.querySelector('h1')?.textContent.trim() ||
        doc.title ||
        url;

      // 🔥 путь
      const path = new URL(url).pathname;

      // 🔥 модель
      const model = path.split('/')[1] || '';

      // === 1. СТРАНИЦА ===
      pages.push({
        title,
        model,
        url: path,
        text: bodyText,
        type: "page"
      });

      // === 2. ЯКОРЯ (только важные) ===
      doc.querySelectorAll('h1, h2').forEach(h => {

        if (!h.id) return;

        pages.push({
          title: h.textContent.trim(),
          model,
          url: path + '#' + h.id,
          text: bodyText.slice(0, 200),
          type: "section"
        });

      });

      console.log('OK:', path);

    }catch(e){
      console.warn('FAIL:', url);
    }

  }

  // 🔥 удаляем дубли (иногда бывают)
  const seen = new Set();
  pages = pages.filter(p => {
    if (seen.has(p.url)) return false;
    seen.add(p.url);
    return true;
  });

  // 🔥 сохраняем
  const blob = new Blob(
    [JSON.stringify({pages}, null, 2)],
    {type:'application/json'}
  );

  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'search.json';
  a.click();

}
</script>

</body>
</html>
