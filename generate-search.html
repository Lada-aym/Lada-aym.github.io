<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>OS Search Generator</title>

<style>
body{
  font-family: Arial, sans-serif;
  background:#f5f5f5;
  padding:40px;
}

button{
  height:48px;
  padding:0 24px;
  border:none;
  border-radius:12px;
  background:#0d6efd;
  color:#fff;
  font-size:16px;
  cursor:pointer;
  margin-right:10px;
}

button:hover{ opacity:.9; }

pre{
  margin-top:20px;
  padding:20px;
  background:#111;
  color:#0f0;
  border-radius:12px;
  overflow:auto;
  max-height:500px;
}
</style>
</head>
<body>

<h1>OS Search Generator</h1>

<button onclick="generate()">Generate search.json</button>
<button onclick="checkSitemap()">Check sitemap</button>

<pre id="log"></pre>

<script>

const logEl = document.getElementById("log");

function log(...args){
  console.log(...args);
  logEl.textContent += args.join(" ") + "\n";
}

/* =========================
   URL NORMALIZE
========================= */
function normalizeUrl(url){
  try {
    const u = new URL(url, location.href);
    return u.pathname
      .replace(/index\.html$/i, "")
      .replace(/\/+$/, "") || "/";
  } catch {
    return url;
  }
}

/* =========================
   DETECT SECTION
========================= */
function detectSection(path){
  const parts = path.split("/").filter(Boolean);
  return parts.length ? parts[0] : null;
}

/* =========================
   CLEAN TEXT
========================= */
function clean(text){
  return (text || "")
    .replace(/\s+/g, " ")
    .replace(/\u00a0/g, " ")
    .trim();
}

/* =========================
   TITLE EXTRACTION
========================= */
function getTitle(doc){

  const h1 =
    doc.querySelector("main h1") ||
    doc.querySelector("article h1") ||
    doc.querySelector("h1");

  if (h1) return clean(h1.innerText);

  let t = doc.querySelector("title")?.innerText || "";
  t = clean(t).replace(/\s*\|.*$/, "");

  return t || "Untitled";
}

/* =========================
   CONTENT EXTRACTION
========================= */
function getContent(doc){

  doc.querySelectorAll(`
    script,style,nav,header,footer,noscript,
    iframe,.sidebar,.dropdown,.search-float,
    .os-overlay,.menu-scroll,.nav-actions,
    .ads,.comments
  `).forEach(e => e.remove());

  const main =
    doc.querySelector("main") ||
    doc.querySelector("article") ||
    doc.body;

  let text = clean(main.innerText);

  if (text.length < 100){
    const ps = [...doc.querySelectorAll("p")]
      .map(p => clean(p.innerText))
      .filter(t => t.length > 20);

    text = ps.join(" ");
  }

  return text;
}

/* =========================
   FILTER RULES
========================= */
const BAD_URL_PARTS = [
  "tag","category","search","login","register",
  "404","feed","amp","admin","wp-","?","#"
];

function isBadUrl(url){
  return BAD_URL_PARTS.some(x =>
    url.toLowerCase().includes(x)
  );
}

function isBadTitle(title){
  return /menu|footer|header|navigation/i.test(title);
}

/* =========================
   GENERATE
========================= */
async function generate(){

  logEl.textContent = "";
  log("Loading sitemap...");

  try {

    const res = await fetch("/sitemap.xml");
    const xml = new DOMParser()
      .parseFromString(await res.text(), "text/xml");

    let urls = [...xml.querySelectorAll("loc")]
      .map(x => x.textContent.trim())
      .filter(Boolean);

    log("Pages:", urls.length);

    const map = {};
    const seen = new Set();

    for (const url of urls){

      if (isBadUrl(url)) continue;
      if (seen.has(url)) continue;
      seen.add(url);

      try {

        const page = await fetch(url);
        if (!page.ok) continue;

        const doc = new DOMParser()
          .parseFromString(await page.text(), "text/html");

        const title = getTitle(doc);
        if (!title || isBadTitle(title)) continue;

        const content = getContent(doc);
        if (!content || content.length < 120) continue;

        const path = normalizeUrl(url);
        const section = detectSection(path);

        if (!section) continue;

        if (!map[section]){
          map[section] = {
            id: section,
            title: section.replace(/_/g," ").replace(/\b\w/g,s=>s.toUpperCase()),
            url: "/" + section + "/",
            items: []
          };
        }

        // дедуп по title
        if (map[section].items.some(i => i.title === title)) continue;

        map[section].items.push({
          title,
          url: path,
          content: content.slice(0, 300)
        });

      } catch (e){
        log("skip:", url);
      }
    }

    const result = {
      models: Object.values(map)
        .filter(m => m.items.length)
    };

    const blob = new Blob(
      [JSON.stringify(result, null, 2)],
      { type: "application/json" }
    );

    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "search.json";
    a.click();

    log("");
    log("DONE");
    log("Models:", result.models.length);

    let pages = 0;
    result.models.forEach(m => pages += m.items.length);

    log("Pages:", pages);

  } catch (e){
    log("ERROR:", e.message);
  }
}

/* =========================
   CHECK SITEMAP
========================= */
async function checkSitemap(){

  try {

    const res = await fetch("/sitemap.xml");
    const xml = new DOMParser()
      .parseFromString(await res.text(), "text/xml");

    const urls = [...xml.querySelectorAll("loc")]
      .map(x => x.textContent);

    log("Sitemap OK:", urls.length);
    urls.forEach(u => log(u));

  } catch(e){
    log("Sitemap error:", e.message);
  }
}

</script>

</body>
</html>
