<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Search Generator PRO</title>
</head>
<body>

<button onclick="generate()">Сгенерировать search.json</button>

<script>
async function generate(){

  const res = await fetch('https://lada-aym.github.io/sitemap.xml');
  const xmlText = await res.text();
  const xml = new DOMParser().parseFromString(xmlText, "text/xml");

  const urls = [...xml.querySelectorAll('loc')].map(n => n.textContent);

  let pages = [];

  for (let url of urls){

    try{

      const r = await fetch(url);
      const html = await r.text();

      const doc = new DOMParser().parseFromString(html, 'text/html');

      // ===========================
      // 🔥 ЧИСТКА МУСОРА
      // ===========================
      doc.querySelectorAll('script, style, noscript').forEach(el => el.remove());

      // убираем JSON-LD и прочее
      doc.querySelectorAll('[type="application/ld+json"]').forEach(el => el.remove());

      // ===========================
      // 📄 TITLE
      // ===========================
      const title = (doc.title || '').trim();

      // ===========================
      // 🧠 ЧИСТЫЙ ТЕКСТ
      // ===========================
      const clean = (t)=> t
        .replace(/\s+/g,' ')
        .replace(/[{}[\]@"]/g,'')   // 🔥 убираем мусор типа "@context"
        .trim()
        .toLowerCase();

      const bodyText = clean(doc.body.innerText).slice(0, 2000);

      const model = url.split('/')[3] || '';

      const path = url.replace(location.origin, '');

      // ===========================
      // 📦 СТРАНИЦА
      // ===========================
      pages.push({
        title,
        url: path,
        text: bodyText,
        type: "page"
      });

      // ===========================
      // 🔹 ЗАГОЛОВКИ (h1–h3)
      // ===========================
      doc.querySelectorAll('h1, h2, h3').forEach(h => {

        if (!h.id) return;

        const t = clean(h.textContent);

        if (t.length < 3) return;

        pages.push({
          title: t,
          url: path + '#' + h.id,
          text: bodyText.slice(0, 300),
          type: "section"
        });

      });

      // ===========================
      // 📊 ТАБЛИЦЫ
      // ===========================
      doc.querySelectorAll('table').forEach((table, i) => {

        const text = clean(table.innerText).slice(0, 400);

        if (text.length < 20) return;

        pages.push({
          title: "Таблица",
          url: path,
          text: text,
          type: "table"
        });

      });

      console.log('OK:', url);

    }catch(e){
      console.warn('FAIL:', url);
    }

  }

  // ===========================
  // 🔥 УДАЛЯЕМ ДУБЛИ
  // ===========================
  const unique = [];
  const seen = new Set();

  for (let p of pages){
    const key = p.url + p.title;
    if (!seen.has(key)){
      seen.add(key);
      unique.push(p);
    }
  }

  // ===========================
  // 💾 СКАЧИВАНИЕ
  // ===========================
  const blob = new Blob(
    [JSON.stringify({pages: unique}, null, 2)],
    {type:'application/json'}
  );

  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'search.json';
  a.click();

  console.log('ГОТОВО 🔥 страниц:', unique.length);
}
</script>

</body>
</html>
