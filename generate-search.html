<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>OS Search Generator</title>

<style>
body{
  font-family: Arial, sans-serif;
  background:#f5f5f5;
  padding:40px;
}

button{
  height:48px;
  padding:0 24px;
  border:none;
  border-radius:12px;
  background:#0d6efd;
  color:#fff;
  font-size:16px;
  cursor:pointer;
}

button:hover{
  opacity:.9;
}

pre{
  margin-top:20px;
  padding:20px;
  background:#111;
  color:#0f0;
  border-radius:12px;
  overflow:auto;
  max-height:500px;
}
</style>
</head>
<body>

<h1>OS Search Generator</h1>

<button onclick="generate()">
  Generate search.json
</button>

<pre id="log"></pre>

<script>
async function generateSearchJSON() {

  const res = await fetch("/sitemap.xml");
  const xmlText = await res.text();

  const xml = new DOMParser().parseFromString(xmlText, "text/xml");

  const urls = [...xml.querySelectorAll("url > loc")]
    .map(el => el.textContent.trim())
    .filter(Boolean);

  const models = [];

  for (const url of urls) {

    const clean = new URL(url);

    const parts = clean.pathname
      .split("/")
      .filter(Boolean);

    if (parts.length === 0) continue;

    // =========================
    // MODEL DETECTION
    // =========================
    const modelId = parts[0];

    // title = last segment or folder
    const title = parts.length > 1
      ? parts[parts.length - 1].replace(/[-_]/g, " ")
      : modelId.replace(/[-_]/g, " ");

    // =========================
    // FIND MODEL OR CREATE
    // =========================
    let model = models.find(m => m.id === modelId);

    if (!model) {

      model = {
        id: modelId,
        title: capitalize(modelId),
        url: "/" + modelId + "/"
      };

      models.push(model);
    }

    // =========================
    // (OPTIONAL) store pages info for search boost
    // =========================
    if (!model._pages) model._pages = [];

    model._pages.push({
      title: title,
      url: clean.pathname
    });
  }

  // =========================
  // CLEAN OUTPUT (IMPORTANT)
  // =========================
  const output = {
    models: models.map(m => ({
      id: m.id,
      title: m.title,
      url: m.url
    }))
  };

  console.log("SEARCH JSON:", output);

  downloadJSON(output, "search.json");
}

// =========================
// HELPERS
// =========================
function capitalize(str) {
  return str.charAt(0).toUpperCase() + str.slice(1);
}

function downloadJSON(data, filename) {

  const blob = new Blob(
    [JSON.stringify(data, null, 2)],
    { type: "application/json" }
  );

  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  a.click();

  URL.revokeObjectURL(url);
}

</script>

</body>
</html>
