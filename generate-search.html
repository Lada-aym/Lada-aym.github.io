<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OS Search Generator</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 40px;
      background: #f5f5f5;
      color: #111;
      font-family: Arial, sans-serif;
    }
    h1 { margin-top: 0; margin-bottom: 20px; font-size: 32px; }
    .actions { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 20px; }
    button {
      height: 48px;
      padding: 0 24px;
      border: none;
      border-radius: 12px;
      background: #0d6efd;
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: .15s ease;
    }
    button:hover { opacity: .92; }
    button:active { transform: scale(.98); }
    pre {
      margin: 0;
      padding: 20px;
      border-radius: 16px;
      background: #111;
      color: #00ff88;
      overflow: auto;
      max-height: 70vh;
      white-space: pre-wrap;
      line-height: 1.5;
    }
    .muted { color: #666; }
  </style>
</head>
<body>

<h1>🚀 OS Search Generator</h1>
<p class="muted">Генерация точечного search.json из контента мануалов (блоки main и section.content2)</p>

<div class="actions">
  <button id="generateBtn">Generate search.json</button>
</div>

<pre id="log"></pre>

<script>
/* =========================================================
   LOG
========================================================= */
const logEl = document.getElementById("log");

function log(...args) {
  console.log(...args);
  logEl.textContent += args.join(" ") + "\n";
  logEl.scrollTop = logEl.scrollHeight;
}

/* =========================================================
   CLEAN TEXT
========================================================= */
function clean(text) {
  return (text || "")
    .replace(/\u00a0/g, " ")
    .replace(/\s+/g, " ")
    .trim();
}

/* =========================================================
   NORMALIZE URL
========================================================= */
function normalizeUrl(url) {
  try {
    const u = new URL(url, window.location.origin);
    return (
      u.pathname
        .replace(/index\.html$/i, "")
        .replace(/\/+$/, "") || "/"
    );
  } catch {
    return url;
  }
}

/* =========================================================
   TITLE EXTRACT
========================================================= */
function getTitle(doc) {
  let title = doc.querySelector("title")?.textContent || "";
  title = clean(title);
  title = title.replace(/\s*—\s*LADA\s*Samara.*/i, ""); // Отсекаем хвост бренда
  title = title.replace(/\s*\|.*$/, "");

  if (title) return title;

  const og = doc.querySelector('meta[property="og:title"]')?.content;
  if (og) return clean(og);

  return "Untitled";
}

/* =========================================================
   DESCRIPTION EXTRACT
========================================================= */
function getDescription(doc) {
  const meta = doc.querySelector('meta[name="description"]') || doc.querySelector('meta[property="og:description"]');
  const content = clean(meta?.content || "");
  return content.slice(0, 240);
}

/* =========================================================
   REMOVE NOISE (Чистим мусор внутри контента перед парсингом)
========================================================= */
function removeNoise(targetElement) {
  if (!targetElement) return;
  
  // Удаляем интерактивные элементы, картинки и скрипты конкретно из блока статьи
  targetElement.querySelectorAll(`
    script, style, noscript, iframe, svg, canvas,
    .os-img-caption, span[class*="caption"], 
    .os-book-model-tag, .os-page-header,
    button, .badge, .alert-close
  `).forEach(el => el.remove());
}

/* =========================================================
   CONTENT EXTRACT (Фильтрация под твою архитектуру)
========================================================= */
function getContent(doc) {
  // 1. Ищем новые страницы (основной тег main)
  let target = doc.querySelector("main");
  
  // 2. Если не нашли, ищем старые страницы по селектору класса
  if (!target) {
    target = doc.querySelector("section.content2");
  }

  // Если целевой блок с чистым контентом найден
  if (target) {
    // Клонируем элемент, чтобы не портить исходный DOM при удалении шума
    const clonedTarget = target.cloneNode(true);
    removeNoise(clonedTarget);
    
    return clean(clonedTarget.innerText || clonedTarget.textContent || "");
  }

  // ❌ Если на странице нет ни <main>, ни <section class="content2">, 
  // значит это системный файл (или мусор). Возвращаем пустоту, чтобы скрипт её пропустил.
  return "";
}

/* =========================================================
   KEYWORDS
========================================================= */
function buildKeywords(text) {
  const words = clean(text)
    .toLowerCase()
    .replace(/[^a-zа-яё0-9\s]/gi, " ")
    .split(/\s+/)
    .filter(w => w.length > 3);

  const unique = [...new Set(words)];
  return unique.slice(0, 60).join(" ");
}

/* =========================================================
   DOWNLOAD FILE
========================================================= */
function downloadJSON(data) {
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "search.json";
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(a.href);
}

/* =========================================================
   GENERATE
========================================================= */
async function generate() {
  logEl.textContent = "";
  log("🚀 Загрузка sitemap.xml...");

  try {
    const sitemapResponse = await fetch("/sitemap.xml");

    if (!sitemapResponse.ok) {
      throw new Error("sitemap.xml HTTP " + sitemapResponse.ok);
    }

    const sitemapText = await sitemapResponse.text();
    const sitemap = new DOMParser().parseFromString(sitemapText, "text/xml");
    const urls = [...sitemap.querySelectorAll("loc")].map(x => x.textContent.trim()).filter(Boolean);

    log("📄 Страниц обнаружено в sitemap:", urls.length);

    const result = {
      generatedAt: new Date().toISOString(),
      version: 1,
      items: []
    };

    let indexed = 0;
    let skipped = 0;

    for (const url of urls) {
      try {
        // Пропускаем главный index.html (оболочку SPA), если она есть в ситмапе
        if (url.endsWith('/index.html') || url === window.location.origin + '/') {
          skipped++;
          log("🦘 Пропущена главная страница-фреймворк:", url);
          continue;
        }

        const response = await fetch(url);
        if (!response.ok) {
          throw new Error("HTTP " + response.status);
        }

        const html = await response.text();
        const doc = new DOMParser().parseFromString(html, "text/html");

        const title = getTitle(doc);
        const description = getDescription(doc);
        const content = getContent(doc);

        // Если контент пустой (страница не подошла под фильтры <main> или .content2)
        if (!content || content.length < 40) {
          skipped++;
          log(`⚠ Пропущена (нет целевого контента main/.content2): ${url}`);
          continue;
        }

        const normalizedUrl = normalizeUrl(url);
        const keywords = buildKeywords(title + " " + description + " " + content);

        result.items.push({
          title: title,
          url: normalizedUrl,
          description: description,
          content: content.slice(0, 4000), // Ограничение длины статьи, чтобы search.json не весил тонну
          keywords: keywords
        });

        indexed++;
        log(`✓ Индексировано: ${normalizedUrl} [${title}]`);

      } catch (e) {
        skipped++;
        log("❌ Ошибка парсинга:", url, "|", e.message);
      }
    }

    result.total = result.items.length;
    downloadJSON(result);

    log("");
    log("==================================================");
    log("✅ ИНДЕКСАЦИЯ ЗАВЕРШЕНА");
    log("📦 Успешно добавлено страниц:", indexed);
    log("🗑️ Отфильтровано/пропущено:", skipped);
    log("🧠 Всего записей в итоговом поиске:", result.items.length);
    log("==================================================");

  } catch (e) {
    log("💥 КРИТИЧЕСКАЯ ОШИБКА:", e.message);
  }
}

/* =========================================================
   EVENTS
========================================================= */
document.getElementById("generateBtn").addEventListener("click", generate);
</script>

</body>
</html>
