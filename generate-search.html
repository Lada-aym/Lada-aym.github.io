<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>OS Search Generator</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      padding: 40px;
    }

    button {
      height: 48px;
      padding: 0 24px;
      border: none;
      border-radius: 12px;
      background: #0d6efd;
      color: #fff;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      opacity: .9;
    }

    pre {
      margin-top: 20px;
      padding: 20px;
      background: #111;
      color: #0f0;
      border-radius: 12px;
      overflow: auto;
      max-height: 500px;
    }
  </style>
</head>
<body>

<h1>OS Search Generator</h1>

<button onclick="generate()">
  Generate search.json
</button>

<pre id="log"></pre>

<script>
const logEl = document.getElementById("log");

function log(...args) {
  console.log(...args);
  logEl.textContent += args.join(" ") + "\n";
}

// =========================
// NORMALIZE URL
// =========================
function normalizeUrl(url) {
  try {
    const u = new URL(url, window.location.href);
    let pathname = u.pathname;

    // Убираем index.html и завершающие слэши
    pathname = pathname
      .replace(/index\.html$/i, "")
      .replace(/\/+$/, "");

    return pathname || "/";
  } catch {
    return url;
  }
}

// =========================
// MODEL DETECTION
// =========================
function detectModel(path) {
  const parts = path
    .split("/")
    .filter(Boolean);

  if (!parts.length) return null;

  return parts[0];
}

// =========================
// CLEAN TEXT
// =========================
function cleanText(text) {
  return text
    .replace(/\s+/g, " ")
    .replace(/[ ]+/g, " ")
    .trim();
}

// =========================
// PAGE TITLE
// =========================
function getTitle(doc) {
  // Сначала ищем h1 в основном контенте
  const h1 = doc.querySelector("main h1, article h1, .content h1");
  if (h1) return cleanText(h1.innerText);

  // Затем заголовок страницы
  const titleEl = doc.querySelector("title");
  if (titleEl) {
    let title = cleanText(titleEl.innerText);
    // Убираем название сайта из заголовка
    title = title.replace(/\s*\|\s*[^|]*$/, "").trim();
    return title || "Untitled";
  }

  return "Untitled";
}

// =========================
// EXTRACT CONTENT
// =========================
function extractContent(doc) {
  // Удаляем шумные элементы
  doc.querySelectorAll(`
    script,
    style,
    nav,
    header,
    footer,
    noscript,
    iframe,
    .sidebar,
    .dropdown,
    .search-float,
    .os-overlay,
    .menu-scroll,
    .nav-actions,
    .ads,
    .comments
  `).forEach(el => el.remove());

  // Ищем основной контент
  const main =
    doc.querySelector("main") ||
    doc.querySelector("article") ||
    doc.querySelector(".content") ||
    doc.querySelector(".page-content") ||
    doc.body;

  let content = cleanText(main.innerText || "");

  // Если контента мало, пробуем найти другой источник
  if (content.length < 20) {
    const paragraphs = Array.from(doc.querySelectorAll("p"))
      .map(p => cleanText(p.innerText))
      .filter(text => text.length > 10);

    content = paragraphs.slice(0, 3).join(" ");
  }

  return content;
}

// =========================
// GENERATE
// =========================
async function generate() {
  logEl.textContent = "";

  log("Loading sitemap...");

  try {
    // =========================
    // SITEMAP
    // =========================
    const res = await fetch("/sitemap.xml");

    if (!res.ok) {
      throw new Error(`Sitemap load failed: ${res.status}`);
    }

    const xmlText = await res.text();
    const xml = new DOMParser()
      .parseFromString(xmlText, "text/xml");

    const urls = [
      ...xml.querySelectorAll("loc")
    ].map(el => el.textContent.trim())
      .filter(url => url); // Убираем пустые URL

    log("Pages found in sitemap:", urls.length);

    // =========================
    // MODELS
    // =========================
    const modelsMap = {};

    // =========================
    // PARSE PAGES
    // =========================
    for (const url of urls) {
      try {
        log("Processing:", url);

        const page = await fetch(url);

        if (!page.ok) {
          log("SKIP (HTTP error):", url, page.status);
          continue;
        }

        const html = await page.text();
        const doc = new DOMParser()
          .parseFromString(html, "text/html");

        // =====================
        // TITLE
        // =====================
        const title = getTitle(doc);

        // =====================
        // CONTENT
        // =====================
        let content = extractContent(doc);

        if (content.length < 20) {
          log("SKIP (no content):", url);
          continue;
        }

        // =====================
        // URL
        // =====================
        const path = normalizeUrl(url);

        // =====================
        // MODEL
        // =====================
        const modelId = detectModel(path);

        // Главная сайта
        if (!modelId) {
          if (!modelsMap.root) {
            modelsMap.root = {
              id: "root",
              title: "Главная",
              url: "/",
              items: []
            };
          }

          modelsMap.root.items.push({
            title,
            url: path,
            content: content.slice(0, 400)
          });

          continue;
        }

        // =====================
        // MODEL INIT
        // =====================
        if (!modelsMap[modelId]) {
          modelsMap[modelId] = {
            id: modelId.toLowerCase(),
            title: modelId
              .replace(/_/g, " ")
              .replace(/\b\w/g, s => s.toUpperCase()),
            url: `/${modelId}/`,
            items: []
          };
        }

        // =====================
        // ITEM
        // =====================
        modelsMap[modelId].items.push({
          title,
          url: path,
          content: content.slice(0, 400)
        });
      } catch (e) {
        console.warn("SKIP:", url, e);
        log("SKIP (error):", url, e.message);
      }
    }

    // =========================
    // RESULT
    // =========================
    const result = {
      models: Object.values(modelsMap)
    };

    // Валидация результата
    if (result.models.length === 0) {
      throw new Error("No valid models found. Check your sitemap and page structure.");
    }

        // =========================
    // DOWNLOAD
    // =========================
    const blob = new Blob(
      [JSON.stringify(result, null, 2)],
      { type: "application/json" }
    );

    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "search.json";
    document.body.appendChild(a); // Добавляем элемент в DOM перед кликом
    a.click();
    document.body.removeChild(a); // Удаляем элемент после скачивания
    URL.revokeObjectURL(a.href); // Освобождаем память

    log("");
    log("✅ DONE — search.json generated successfully");
    log("Models:", result.models.length);

    let pages = 0;
    result.models.forEach(m => {
      pages += m.items.length;
    });

    log("Pages indexed:", pages);

    // Дополнительная информация о сгенерированном файле
    log("\n--- Generated search.json structure ---");
    result.models.forEach(model => {
      log(`Model: ${model.title} (${model.id}) - ${model.items.length} items`);
    });
    log("----------------------------------------");

  } catch (error) {
    log("❌ ERROR:", error.message);
    console.error("Generator error:", error);

    // Более информативное сообщение об ошибке
    if (error.message.includes("Sitemap")) {
      log("💡 Hint: Make sure /sitemap.xml exists and is accessible");
    } else if (error.message.includes("No valid models")) {
      log("💡 Hint: Check that your pages have proper content and titles");
    }
  }
}

// =========================
// UTILITY FUNCTIONS
// =========================

// Функция для ручной проверки sitemap
async function checkSitemap() {
  try {
    const res = await fetch("/sitemap.xml");
    if (!res.ok) throw new Error(`Sitemap not found: ${res.status}`);

    const xmlText = await res.text();
    const xml = new DOMParser().parseFromString(xmlText, "text/xml");
    const urls = [...xml.querySelectorAll("loc")].map(el => el.textContent);

    log(`Sitemap loaded successfully. Found ${urls.length} URLs:`);
    urls.forEach((url, i) => log(`${i + 1}. ${url}`));
  } catch (e) {
    log("Sitemap check failed:", e.message);
  }
}

// Кнопка для проверки sitemap (опционально)
document.addEventListener("DOMContentLoaded", () => {
  const checkBtn = document.createElement("button");
  checkBtn.textContent = "Check sitemap.xml";
  checkBtn.style.marginTop = "10px";
  checkBtn.onclick = checkSitemap;
  document.querySelector("button").parentNode.appendChild(checkBtn);
});

</script>

</body>
</html>
