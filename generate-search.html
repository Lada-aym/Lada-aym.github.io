<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Search Generator PRO</title>
</head>
<body>

<button onclick="generate()">Сгенерировать search.json</button>

<script>
async function generate(){

  const res = await fetch('/sitemap.xml');
  const xmlText = await res.text();
  const xml = new DOMParser().parseFromString(xmlText, "text/xml");

  const urls = [...xml.querySelectorAll("loc")].map(el => el.textContent);

  const results = [];

  for(const url of urls){

    try{
      const page = await fetch(url);
      const html = await page.text();
      const doc = new DOMParser().parseFromString(html, "text/html");

      // =========================
      // TITLE
      // =========================
      const title = doc.querySelector("title")?.innerText || "";

      // =========================
      // SECTION (ВАЖНО!)
      // =========================
      let section = "other";

      if(url.includes("opisanie")) section = "opisanie";
      else if(url.includes("ekspluatatsiya")) section = "ekspluatatsiya";
      else if(url.includes("obsluzhivanie")) section = "obsluzhivanie";
      else if(url.includes("tehnicheskaya")) section = "harakteristika";
      else if(url.includes("prilozheniya")) section = "prilozheniya";

      // =========================
      // ЧИСТИМ МУСОР
      // =========================
      doc.querySelectorAll(`
        script,
        style,
        nav,
        header,
        footer,
        amp-sidebar,
        .navbar,
        .menu,
        .dropdown,
        .nav-dropdown
      `).forEach(el => el.remove());

      // =========================
      // КОНТЕНТ (ТОЛЬКО СТАТЬЯ)
      // =========================
      let content = "";

      // приоритет — articleBody
      const article = doc.querySelector('[itemprop="articleBody"]');

      if(article){
        content = article.innerText;
      } else {
        // fallback — все текстовые блоки
        const blocks = doc.querySelectorAll('p, h1, h2, h3, h4');
        content = [...blocks].map(el => el.innerText).join(" ");
      }

      // =========================
      // ЧИСТКА ТЕКСТА
      // =========================
      content = content
        .replace(/\s+/g, " ")
        .replace(/[\n\r]/g, " ")
        .trim()
        .slice(0, 500); // ограничение

      // если пусто — пропускаем
      if(!content) continue;

      results.push({
        title,
        url,
        content,
        section
      });

    } catch(e){
      console.warn("Ошибка:", url);
    }

  }

  // =========================
  // СОХРАНЕНИЕ
  // =========================
  const blob = new Blob(
    [JSON.stringify(results, null, 2)],
    { type: "application/json" }
  );

  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "search.json";
  a.click();
}

</script>

</body>
</html>
