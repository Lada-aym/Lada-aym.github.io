<!DOCTYPE html>
<html lang="ru">
<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>
    OS Search Generator
  </title>

  <style>

    *{
      box-sizing:border-box;
    }

    body{

      margin:0;

      padding:40px;

      background:#f5f5f5;

      color:#111;

      font-family:
        Arial,
        sans-serif;
    }

    h1{

      margin-top:0;

      margin-bottom:20px;

      font-size:32px;
    }

    .actions{

      display:flex;

      gap:12px;

      flex-wrap:wrap;

      margin-bottom:20px;
    }

    button{

      height:48px;

      padding:0 24px;

      border:none;

      border-radius:12px;

      background:#0d6efd;

      color:#fff;

      font-size:16px;

      font-weight:600;

      cursor:pointer;

      transition:.15s ease;
    }

    button:hover{
      opacity:.92;
    }

    button:active{
      transform:scale(.98);
    }

    pre{

      margin:0;

      padding:20px;

      border-radius:16px;

      background:#111;

      color:#00ff88;

      overflow:auto;

      max-height:70vh;

      white-space:pre-wrap;

      line-height:1.5;
    }

    .muted{
      color:#666;
    }

  </style>

</head>
<body>

<h1>
  🚀 OS Search Generator
</h1>

<p class="muted">
  Генерация search.json из sitemap.xml
</p>

<div class="actions">

  <button id="generateBtn">
    Generate search.json
  </button>

</div>

<pre id="log"></pre>

<script>

/* =========================================================
   LOG
========================================================= */

const logEl =
  document.getElementById(
    "log"
  );

function log(...args){

  console.log(...args);

  logEl.textContent +=
    args.join(" ") + "\n";

  logEl.scrollTop =
    logEl.scrollHeight;
}

/* =========================================================
   CLEAN TEXT
========================================================= */

function clean(text){

  return (text || "")

    .replace(/\u00a0/g, " ")

    .replace(/\s+/g, " ")

    .trim();
}

/* =========================================================
   NORMALIZE URL
========================================================= */

function normalizeUrl(url){

  try {

    const u =
      new URL(
        url,
        window.location.origin
      );

    return (
      u.pathname

        .replace(
          /index\.html$/i,
          ""
        )

        .replace(
          /\/+$/,
          ""
        ) || "/"
    );

  } catch {

    return url;
  }
}

/* =========================================================
   TITLE EXTRACT
========================================================= */

function getTitle(doc){

  const h1 =

    doc.querySelector(
      "main h1"
    ) ||

    doc.querySelector(
      "article h1"
    ) ||

    doc.querySelector(
      ".content h1"
    ) ||

    doc.querySelector(
      "h1"
    );

  if (h1){

    const txt =
      clean(
        h1.textContent
      );

    if (txt){
      return txt;
    }
  }

  let title =

    doc.querySelector(
      "title"
    )?.textContent || "";

  title = clean(title);

  title = title.replace(
    /\s*\|.*$/,
    ""
  );

  if (title){
    return title;
  }

  return "Untitled";
}

/* =========================================================
   DESCRIPTION EXTRACT
========================================================= */

function getDescription(doc){

  const meta =

    doc.querySelector(
      'meta[name="description"]'
    ) ||

    doc.querySelector(
      'meta[property="og:description"]'
    );

  const content =
    clean(
      meta?.content || ""
    );

  return content.slice(0, 240);
}

/* =========================================================
   REMOVE NOISE
========================================================= */

function removeNoise(doc){

  doc.querySelectorAll(`

    script,
    style,
    noscript,
    iframe,
    svg,
    canvas,

    nav,
    header,
    footer,

    .sidebar,
    .menu,
    .dropdown,
    .search,
    .search-float,
    .search-overlay,

    .nav-actions,
    .menu-scroll,

    .ads,
    .comments,
    .banner,
    .cookie,
    .popup,
    .modal

  `).forEach(el => {
    el.remove();
  });
}

/* =========================================================
   CONTENT EXTRACT
========================================================= */

function getContent(doc){

  removeNoise(doc);

  const candidates = [

    doc.querySelector(
      '[itemprop="articleBody"]'
    ),

    doc.querySelector(
      '[itemprop="text"]'
    ),

    doc.querySelector(
      "main"
    ),

    doc.querySelector(
      "article"
    ),

    doc.querySelector(
      ".content"
    ),

    doc.body

  ].filter(Boolean);

  let best = "";

  for (const el of candidates){

    const text =
      clean(
        el.innerText ||
        el.textContent ||
        ""
      );

    if (
      text.length >
      best.length
    ){
      best = text;
    }
  }

  if (best.length < 120){

    const paragraphs =
      [...doc.querySelectorAll("p")]

        .map(p =>
          clean(
            p.innerText ||
            p.textContent
          )
        )

        .filter(
          t => t.length > 30
        );

    best =
      paragraphs.join(" ");
  }

  return best;
}

/* =========================================================
   KEYWORDS
========================================================= */

function buildKeywords(text){

  const words =

    clean(text)

      .toLowerCase()

      .replace(
        /[^a-zа-яё0-9\s]/gi,
        " "
      )

      .split(/\s+/)

      .filter(w =>
        w.length > 3
      );

  const unique =
    [...new Set(words)];

  return unique
    .slice(0, 60)
    .join(" ");
}

/* =========================================================
   PARSE PAGE
========================================================= */

async function parsePage(url){

  const response =
    await fetch(url);

  if (!response.ok){

    throw new Error(
      "HTTP " +
      response.status
    );
  }

  const html =
    await response.text();

  const doc =
    new DOMParser()
      .parseFromString(
        html,
        "text/html"
      );

  const title =
    getTitle(doc);

  const description =
    getDescription(doc);

  const content =
    getContent(doc);

  const keywords =
    buildKeywords(
      title +
      " " +
      description +
      " " +
      content
    );

  return {

    title,

    description,

    content,

    keywords
  };
}

/* =========================================================
   DOWNLOAD FILE
========================================================= */

function downloadJSON(data){

  const blob =
    new Blob(

      [
        JSON.stringify(
          data,
          null,
          2
        )
      ],

      {
        type:
          "application/json"
      }
    );

  const a =
    document.createElement(
      "a"
    );

  a.href =
    URL.createObjectURL(
      blob
    );

  a.download =
    "search.json";

  document.body.appendChild(a);

  a.click();

  a.remove();

  URL.revokeObjectURL(
    a.href
  );
}

/* =========================================================
   GENERATE
========================================================= */

async function generate(){

  logEl.textContent = "";

  log(
    "🚀 Loading sitemap..."
  );

  try {

    const sitemapResponse =
      await fetch(
        "/sitemap.xml"
      );

    if (
      !sitemapResponse.ok
    ){

      throw new Error(
        "sitemap.xml HTTP " +
        sitemapResponse.status
      );
    }

    const sitemapText =
      await sitemapResponse.text();

    const sitemap =
      new DOMParser()
        .parseFromString(
          sitemapText,
          "text/xml"
        );

    const urls =

      [
        ...sitemap.querySelectorAll(
          "loc"
        )
      ]

      .map(
        x =>
          x.textContent.trim()
      )

      .filter(Boolean);

    log(
      "📄 Pages found:",
      urls.length
    );

    const result = {
      generatedAt:
        new Date()
          .toISOString(),

      version: 1,

      items: []
    };

    let indexed = 0;
    let skipped = 0;

    for (const url of urls){

      try {

        log(
          "🔍 Index:",
          url
        );

        const page =
          await parsePage(
            url
          );

        if (
          !page.content ||
          page.content.length < 30
        ){

          skipped++;

          log(
            "⚠ skipped (small content)"
          );

          continue;
        }

        const normalizedUrl =
          normalizeUrl(url);

        result.items.push({

          title:
            page.title,

          url:
            normalizedUrl,

          description:
            page.description,

          content:
            page.content
              .slice(0, 5000),

          keywords:
            page.keywords
        });

        indexed++;

      } catch (e){

        skipped++;

        log(
          "❌ skip:",
          url,
          "|",
          e.message
        );
      }
    }

    result.total =
      result.items.length;

    downloadJSON(result);

    log("");
    log(
      "=============================="
    );

    log(
      "✅ DONE"
    );

    log(
      "📦 Indexed:",
      indexed
    );

    log(
      "⚠ Skipped:",
      skipped
    );

    log(
      "🧠 Search items:",
      result.items.length
    );

    log(
      "=============================="
    );

  } catch (e){

    log(
      "💥 ERROR:",
      e.message
    );
  }
}

/* =========================================================
   EVENTS
========================================================= */

document
  .getElementById(
    "generateBtn"
  )
  .addEventListener(
    "click",
    generate
  );

</script>

</body>
</html>
