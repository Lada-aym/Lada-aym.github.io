<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>OS Search Generator</title>

<style>
body{
  font-family: Arial, sans-serif;
  background:#f5f5f5;
  padding:40px;
}

button{
  height:48px;
  padding:0 24px;
  border:none;
  border-radius:12px;
  background:#0d6efd;
  color:#fff;
  font-size:16px;
  cursor:pointer;
}

button:hover{ opacity:.9; }

pre{
  margin-top:20px;
  padding:20px;
  background:#111;
  color:#0f0;
  border-radius:12px;
  overflow:auto;
  max-height:500px;
}
</style>
</head>
<body>

<h1>OS Search Generator</h1>

<button onclick="generate()">
  Generate search.json
</button>

<pre id="log"></pre>

<script>

const logEl = document.getElementById("log");

function log(...args){
  console.log(...args);
  logEl.textContent += args.join(" ") + "\n";
}

// =========================
// CLEAN TEXT
// =========================
function cleanText(text){
  return text
    .replace(/\s+/g, " ")
    .trim();
}

// =========================
// NORMALIZE URL
// =========================
function normalizeUrl(url){
  try {
    const u = new URL(url);
    return u.pathname.replace(/index\.html$/i, "").replace(/\/+$/, "");
  } catch {
    return url;
  }
}

// =========================
// MODEL DETECTION
// =========================
function detectModel(path){
  const parts = path.split("/").filter(Boolean);
  if (!parts.length) return null;
  return parts[0];
}

// =========================
// TITLE
// =========================
function getTitle(doc){
  return (
    doc.querySelector("h1")?.innerText?.trim() ||
    doc.querySelector("title")?.innerText?.trim() ||
    "Untitled"
  );
}

// =========================
// GENERATE
// =========================
async function generate(){

  logEl.textContent = "";

  log("Loading sitemap...");

  const res = await fetch("/sitemap.xml");
  const xmlText = await res.text();

  const xml = new DOMParser()
    .parseFromString(xmlText, "text/xml");

  const urls = [...xml.querySelectorAll("loc")]
    .map(el => el.textContent);

  log("Pages:", urls.length);

  // =========================
  // MODELS MAP
  // =========================
  const modelsMap = {};

  for (const url of urls){

    try {

      log("Index:", url);

      const page = await fetch(url);
      const html = await page.text();

      const doc = new DOMParser()
        .parseFromString(html, "text/html");

      // remove noise
      doc.querySelectorAll(`
        script,style,nav,header,footer,noscript,
        iframe,.sidebar,.dropdown,.search-float,
        .os-overlay,.menu-scroll,.nav-actions
      `).forEach(el => el.remove());

      const title = getTitle(doc);

      const main =
        doc.querySelector("main") ||
        doc.querySelector("article") ||
        doc.body;

      const content = cleanText(main.innerText || "");

      if (content.length < 20) continue;

      const path = normalizeUrl(url);

      const modelId = detectModel(path);

      if (!modelId) continue;

      const id = modelId.toLowerCase();

      // =========================
      // MODEL INIT
      // =========================
      if (!modelsMap[id]) {

        modelsMap[id] = {
          id: id,
          title: modelId
            .replace(/_/g, " ")
            .replace(/\b\w/g, s => s.toUpperCase()),
          url: `/${modelId}/`,
          items: []
        };
      }

      // =========================
      // PUSH PAGE
      // =========================
      modelsMap[id].items.push({
        title,
        url: path,
        content: content.slice(0, 400)
      });

    } catch (e) {
      console.warn("SKIP:", url, e);
    }
  }

  // =========================
  // OUTPUT
  // =========================
  const result = {
    models: Object.values(modelsMap)
  };

  const blob = new Blob(
    [JSON.stringify(result, null, 2)],
    { type: "application/json" }
  );

  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "search.json";
  a.click();

  log("");
  log("DONE");
  log("Models:", result.models.length);
}

</script>

</body>
</html>
