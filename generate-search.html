<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Search Generator 2.0</title>
</head>
<body>

<button onclick="generate()">Сгенерировать search.json</button>
<script>
async function generate(){

  const BASE = 'https://lada-aym.github.io';

  const res = await fetch(BASE + '/sitemap.xml');
  const xmlText = await res.text();
  const xml = new DOMParser().parseFromString(xmlText, "text/xml");

  const urls = [...xml.querySelectorAll('loc')].map(n => n.textContent);

  let pages = [];

  for (let url of urls){

    try{

      const r = await fetch(url);
      const html = await r.text();

      const doc = new DOMParser().parseFromString(html, 'text/html');

      const clean = t => t.replace(/\s+/g,' ').trim();

      // 🔥 нормальный текст (НЕ режем слишком сильно)
      const bodyText = clean(doc.body.innerText).toLowerCase();

      // 🔥 title
      const title =
        doc.querySelector('h1')?.textContent.trim() ||
        doc.title ||
        url;

      // 🔥 модель из URL (надёжно)
      const path = new URL(url).pathname;
      const model = path.split('/')[1] || '';

      // === 1. СТРАНИЦА ===
      pages.push({
        title,
        model,
        url: path,
        text: bodyText.slice(0, 5000),
        type: "page"
      });

      // === 2. ЯКОРЯ (h1–h3 лучше) ===
      doc.querySelectorAll('h1, h2, h3').forEach(h => {

        if (!h.id) return;

        pages.push({
          title: h.textContent.trim(),
          model,
          url: path + '#' + h.id,
          text: bodyText.slice(0, 500),
          type: "section"
        });

      });

      console.log('OK:', path);

    }catch(e){
      console.warn('FAIL:', url);
    }

  }

  // 🔥 сохраняем
  const blob = new Blob(
    [JSON.stringify({pages}, null, 2)],
    {type:'application/json'}
  );

  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'search.json';
  a.click();

}
</script>

</body>
</html>
