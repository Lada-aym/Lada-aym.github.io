<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>LADA SAMARA — Бортовое Руководство</title>
  <link rel="stylesheet" href="/assets/css/os.css">
</head>
<body>
  <div class="app-layout">
    
    <header class="site-header">
      <div class="header-container">
        <button class="burger-btn" id="menuToggleBtn" aria-label="Открыть меню">
          <span></span><span></span><span></span>
        </button>
        <div class="site-logo" id="headerModelTitle">LADA Samara</div>
      </div>
    </header>

    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <aside class="sidebar" id="appSidebar">
      <a href="/" class="sidebar-back-btn">
        <svg viewBox="0 0 24 24" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="19" y1="12" x2="5" y2="12"></line>
          <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
        Вернуться в гараж
      </a>
      <div class="sidebar-header-title"></div>
      <nav class="sidebar-nav" id="accordionMenu">
        <div class="os-empty">Сборка карты руководства...</div>
      </nav>
    </aside>

    <main class="app-content" id="appMainStage">
      <div class="os-empty">
        <div class="os-ai-spin">⚙️</div>
        <div>Инициализация разделов...</div>
      </div>
    </main>

    <nav class="bottom-nav">
      <a href="/" class="bottom-nav-item">
        <svg viewBox="0 0 24 24" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9"></rect><rect x="14" y="3" width="7" height="5"></rect><rect x="14" y="12" width="7" height="9"></rect><rect x="3" y="16" width="7" height="5"></rect></svg>
        <span>Гараж</span>
      </a>
      <a href="" class="bottom-nav-item is-active" id="mobileHomeTab">
        <svg viewBox="0 0 24 24" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
        <span>Главная</span>
      </a>
    </nav>
  </div>

  <script src="/assets/js/os.js"></script>
  <script src="/assets/js/os-search.js"></script>
  <script>
    // Привязываем вкладку "Главная" к текущему разделу PWA
    document.getElementById('mobileHomeTab').href = window.location.pathname;
  </script>
</body>
</html>
