<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  
  <title>База интерактивных руководств по ремонту автомобилей</title>
  <meta name="description" content="Мультибрендовая база интерактивных ремонтных мануалов. Онлайн-руководства, подробные электрические схемы, регламенты технического обслуживания (ТО) и инструкции по поиску неисправностей для различных марок и моделей авто.">
  <meta name="keywords" content="интерактивный мануал, руководство по ремонту, автоэлектрика, электрические схемы, регламент то, авторемонт, мультибрендовый мануал, ремонт авто самостоятельно">
  <link rel="canonical" href="https://lada-aym.github.io/">

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="АвтоМануалы">
  <link rel="apple-touch-icon" href="/assets/img/icon-192.png">

  <meta property="og:type" content="website">
  <meta property="og:url" content="https://lada-aym.github.io/">
  <meta property="og:title" content="База интерактивных руководств по ремонту автомобилей">
  <meta property="og:description" content="Интерактивные автомобильные мануалы, электрические схемы и диагностика неисправностей различных брендов в одном месте. Удобный поиск с телефона прямо в гараже.">
  <meta property="og:image" content="https://lada-aym.github.io/assets/img/og-preview.jpg">
  <meta property="og:site_name" content="Интерактивный Автомануал">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:url" content="https://lada-aym.github.io/">
  <meta name="twitter:title" content="База интерактивных руководств по ремонту автомобилей">
  <meta name="twitter:description" content="Интерактивные автомобильные мануалы, электрические схемы и диагностика неисправностей различных брендов в одном месте. Удобный поиск с телефона прямо в гараже.">
  <meta name="twitter:image" content="https://lada-aym.github.io/assets/img/og-preview.jpg">

  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#121214">
  
  <link rel="stylesheet" href="/assets/css/os.css">
  <link rel="stylesheet" href="/assets/css/core-home.css">
</head>
<body>

  <div class="core-home-container">
    
    <header class="core-hero">
      <div class="core-hero-overlay"></div>
      <div class="core-hero-content">
        <span class="core-badge">Мультибрендовый мануал</span>
        <h1>Выберите модель</h1>
        <p>Глобальный поиск по интерактивным руководствам, электрическим схемам и регламентам ТО.</p>
      </div>
    </header>

    <div class="core-search-trigger" style="cursor: pointer;">
      <div class="core-search-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
      </div>
      <input type="text" id="globalSearchInput" class="core-search-input" placeholder="Введите марку, модель или искомую систему (например: схемы, зазоры, 2114)..." autocomplete="off">
    </div>

    <div class="core-cars-grid" id="carsGrid">
      <div class="core-loading">Загрузка списка моделей...</div>
    </div>

  </div>

  <script src="/assets/js/os-search.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const gridContainer = document.getElementById('carsGrid');

      // Чистая функция инициализации вывода доступных автомобилей из конфигурации
      async function initGarage() {
        try {
          const response = await fetch('/site-data.json');
          if (!response.ok) throw new Error('Ошибка сети при запросе site-data.json');
          
          const siteData = await response.json();
          const models = siteData.models || [];
          
          if (models.length === 0) {
            gridContainer.innerHTML = `<div class="core-loading">Список моделей пуст</div>`;
            return;
          }

          let html = '';
          models.forEach(car => {
            const folderPath = ('/' + car.folder + '/').replace(/\/+/g, '/');
            html += `
              <a href="${folderPath}" class="car-card">
                <div class="car-info">
                  <div class="car-brand">${car.brand}</div>
                  <h2 class="car-title">${car.name}</h2>
                </div>
                <div class="car-action">
                  <span>Открыть руководство</span>
                  <span class="car-arrow">→</span>
                </div>
              </a>
            `;
          });
          gridContainer.innerHTML = html;
          
        } catch (error) {
          console.error('Ошибка инициализации Гаража:', error);
          gridContainer.innerHTML = `
            <div class="core-error">
              ⚠️ Не удалось загрузить список автомобилей.<br>
              <span>Проверьте конфигурационный файл /site-data.json</span>
            </div>
          `;
        }
      }

      // Запуск рендеринга Гаража
      initGarage();

      // Фикс истории браузера
      window.addEventListener('pageshow', () => {
        const input = document.getElementById('globalSearchInput');
        if (input) input.value = '';
      });
    });
  </script>
</body>
</html>
